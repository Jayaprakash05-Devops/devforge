apiVersion: v1
kind: Pod
metadata:
  name: awscli-debug
spec:
#  serviceAccountName: demo-tenant
  containers:
    - name: awscli
      image: amazon/aws-cli:latest
      command: ["/bin/sh", "-c", "sleep infinity"]
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
